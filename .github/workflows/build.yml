name: Build ELIKIA INSTITUT

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run build:win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: ELIKIA-INSTITUT-Windows
          path: dist/*.exe
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build macOS DMG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run build:mac

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: ELIKIA-INSTITUT-macOS
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Linux packages
        run: npm run build:linux

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: ELIKIA-INSTITUT-Linux
          path: |
            dist/*.AppImage
            dist/*.deb
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ELIKIA INSTITUT ${{ github.ref_name }}
          draft: false
          files: |
            artifacts/ELIKIA-INSTITUT-Windows/*
            artifacts/ELIKIA-INSTITUT-macOS/*
            artifacts/ELIKIA-INSTITUT-Linux/*
